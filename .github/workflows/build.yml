name: Update Repo

on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 6,12,18 * * *"
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      curriculum_semester_mode:
        description: "Semester refresh mode"
        required: true
        default: "window"
        type: choice
        options:
          - window
          - all
  repository_dispatch:
    types: [retry_job]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      BUILD_CACHE_KEY_PREFIX: build-${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository }}
          ref: master
      - name: Restore generated build cache
        id: restore-build-cache
        uses: actions/cache/restore@v4
        with:
          path: build
          key: ${{ env.BUILD_CACHE_KEY_PREFIX }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ${{ env.BUILD_CACHE_KEY_PREFIX }}-
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - name: Install dependencies
        run: |
          uv sync --no-dev
          uv run --no-dev patchright install chromium
      - name: Select curriculum refresh mode
        id: curriculum-refresh
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.curriculum_semester_mode }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" = "0 0 * * *" ]; then
            echo "mode=all" >> "$GITHUB_OUTPUT"
          else
            echo "mode=window" >> "$GITHUB_OUTPUT"
          fi
      - name: Run Program
        env:
          TZ: "Asia/Shanghai"
          LIFE_USTC_CURRICULUM_MODE: ${{ steps.curriculum-refresh.outputs.mode }}
          LIFE_USTC_CURRICULUM_WINDOW_YEARS: "1"
          USTC_PASSPORT_USERNAME: ${{ secrets.USTC_PASSPORT_USERNAME }}
          USTC_PASSPORT_PASSWORD: ${{ secrets.USTC_PASSPORT_PASSWORD }}
          USTC_PASSPORT_TOTP_URL: ${{ secrets.USTC_PASSPORT_TOTP_URL }}
          HTTP_PROXY_URL: ${{ secrets.HTTP_PROXY_URL }}
          HTTP_PROXY_USERNAME: ${{ secrets.HTTP_PROXY_USERNAME }}
          HTTP_PROXY_PASSWORD: ${{ secrets.HTTP_PROXY_PASSWORD }}
        run: |
          uv run --no-dev python main.py
      - name: Verify SQLite snapshot
        run: test -f build/life-ustc-static.sqlite
      - name: Save generated build cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: build
          key: ${{ env.BUILD_CACHE_KEY_PREFIX }}-${{ github.run_id }}-${{ github.run_attempt }}
      - name: Prepare Pages artifact
        run: touch build/.nojekyll
      - run: |
          rm -rf build/cache
      - name: Upload static files as artifact
        id: deployment
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: update
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
